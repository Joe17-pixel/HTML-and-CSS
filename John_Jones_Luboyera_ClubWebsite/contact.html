        <h1>Contact Us</h1>
        <form>
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname"><br>
            <label for="lname">Last name</label><br>

            <label for="email">Enter your email:</label><br>
            <input type="email" id="email" name="email"><br>


             <label for="phone">Phone:</label>

            <input type="radio" id="male" name="gender" value="MALE">
            <label for="male">MALE</label><br>
            <input type="radio" id="female" name="gender" value="FEMALE">
            <label for="female">FEMALE</label><br>

            <p>Choose your interests</p>
        <input type="checkbox" id="interest 1" name="interest 1" value="Flora">
        <label for="interest 1">Flora</label><br>
        <input type="checkbox" id="interest 2" name="interest 2" value="Fauna">
        <label for="interest 2">Fauna</label><br>

        <textarea id="wildlifeclub" name="wildlifeclub" rows="10" cols="30"></textarea><br>

        
        
        
        
        <input type="submit" value="Submit"><br>

        </form>
